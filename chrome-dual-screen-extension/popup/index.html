<!DOCTYPE html>
<html>
<head>
  <title>Dual Screen Linker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Dual Screen Linker</h2>
    <div class="status">Status: <span id="status" class="active">Active</span></div>
    
    <h3>Detected Displays</h3>
    <ul id="display-list">
      <li>Loading...</li>
    </ul>

    <div class="actions">
      <button id="refresh-btn">Refresh Displays</button>
    </div>
    
    <div class="info">
      <p>Injects SDK bridge into all pages.</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
